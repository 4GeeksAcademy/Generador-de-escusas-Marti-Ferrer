<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./assets/img/4geeks.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Rigo with Vanilla.js</title>

    <!-- Fontawesome is our recomended library for icons -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
      integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ"
      crossorigin="anonymous"
    />
  </head>
  <body>
    
<h1>Generador de Excusas</h1>
  <button onclick="mostrarExcusa()">Generar excusa</button>
  <p id="excusa"></p>

  <script>
    function mostrarExcusa() {
      const sujetos = ["Mi perro", "El internet", "Mi computadora", "El sistema", "El profesor"];
      const acciones = ["rompió", "eliminó", "bloqueó", "dañó", "reinició"];
      const objetos = ["mi tarea", "el archivo", "el proyecto final", "el correo", "la plataforma"];
      const cuando = ["mientras dormia", "cuando estaba en clase", "cuando hacia ejercicio", "jugando", "mientras me duchaba"];
    





      const excusa =
        sujetos[Math.floor(Math.random() * sujetos.length)] + " " +
        acciones[Math.floor(Math.random() * acciones.length)] + " " +
        objetos[Math.floor(Math.random() * objetos.length)] + ".";
        cuando[Math.floor(Math.random() * cuando.length)] + ".";

      document.getElementById("excusa").textContent = excusa;
    }
  </script>



    <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
    <script type="module" src="/app.js"></script>
  </body>
</html>
